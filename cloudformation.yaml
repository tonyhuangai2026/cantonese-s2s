AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Cantonese S2S voice service.
  Chime Voice Connector (SIP/RTP) → voice-server → cantonese-s2s.

Parameters:
  InstanceType:
    Type: String
    Default: t3.large
    AllowedValues: [t3.medium, t3.large, t3.xlarge, c5.large, c5.xlarge]

  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 key pair for SSH

  VpcId:
    Type: AWS::EC2::VPC::Id

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Public subnet with internet access

  MiniMaxApiKey:
    Type: String
    NoEcho: true

  ChimeVoiceConnectorDomain:
    Type: String
    Default: YOUR_VOICE_CONNECTOR_DOMAIN

  ChimePhoneNumber:
    Type: String
    Default: "+1XXXXXXXXXX"

  GitRepoUrl:
    Type: String
    Default: https://github.com/tonyhuangai2026/cantonese-s2s.git

  S2SPort:
    Type: Number
    Default: 8765

  VoiceServerPort:
    Type: Number
    Default: 3000

  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0

Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0a0e5d9c7acc336f1
    us-west-2:
      AMI: ami-05d38da78ce859165
    ap-northeast-1:
      AMI: ami-0a290015b99140cd1

Resources:
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                  - bedrock:ConverseStream
                  - bedrock:Converse
                Resource: "*"
        - PolicyName: TranscribeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - transcribe:StartStreamTranscription
                  - transcribe:StartStreamTranscriptionWebSocket
                Resource: "*"
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${AWS::StackName} - Cantonese S2S"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        # SSH
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedCidr
        # HTTP API (health, monitoring)
        - IpProtocol: tcp
          FromPort: !Ref VoiceServerPort
          ToPort: !Ref VoiceServerPort
          CidrIp: !Ref AllowedCidr
        # SIP UDP (Chime Voice Connector)
        - IpProtocol: udp
          FromPort: 5060
          ToPort: 5060
          CidrIp: 0.0.0.0/0
        # RTP UDP range (Chime Voice Connector)
        - IpProtocol: udp
          FromPort: 10000
          ToPort: 20000
          CidrIp: 0.0.0.0/0

  Instance:
    Type: AWS::EC2::Instance
    CreationPolicy:
      ResourceSignal:
        Timeout: PT15M
    Properties:
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      SubnetId: !Ref SubnetId
      IamInstanceProfile: !Ref InstanceProfile
      SecurityGroupIds:
        - !Ref SecurityGroup
      ImageId: !FindInMap [RegionAMI, !Ref "AWS::Region", AMI]
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex
          exec > /var/log/cantonese-s2s-setup.log 2>&1

          # Install Docker + Git
          apt-get update -qq
          apt-get install -y -qq docker.io git
          systemctl enable docker && systemctl start docker

          # Get public IP for SIP
          PUBLIC_IP=$(curl -s http://169.254.169.254/latest/meta-data/public-ipv4 || echo "0.0.0.0")
          TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 60" 2>/dev/null)
          if [ -n "$TOKEN" ]; then
            PUBLIC_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-ipv4)
          fi
          echo "Public IP: $PUBLIC_IP"

          # Clone repo
          git clone ${GitRepoUrl} /opt/cantonese-s2s
          cd /opt/cantonese-s2s

          # Build s2s-service
          docker build -t cantonese-s2s:latest -f s2s-service/Dockerfile s2s-service/

          # Build voice-server
          docker build -t cantonese-voice-server:latest -f voice-server/Dockerfile voice-server/

          # Create docker network for inter-container communication
          docker network create s2s-net

          # Start s2s-service
          docker run -d --name s2s-service \
            --network=s2s-net \
            --restart=always \
            -e MINIMAX_API_KEY=${MiniMaxApiKey} \
            -e AWS_DEFAULT_REGION=${AWS::Region} \
            -e PORT=${S2SPort} \
            cantonese-s2s:latest

          # Start voice-server
          docker run -d --name voice-server \
            --network=host \
            --restart=always \
            -e S2S_ENDPOINT=ws://localhost:${S2SPort}/v1/s2s \
            -e PUBLIC_IP=$PUBLIC_IP \
            -e PORT=${VoiceServerPort} \
            -e AWS_DEFAULT_REGION=${AWS::Region} \
            -e RTP_PORT_BASE=10000 \
            -e RTP_PORT_COUNT=10000 \
            cantonese-voice-server:latest

          # Also run s2s-service on host network so voice-server can reach it via localhost
          docker rm -f s2s-service
          docker run -d --name s2s-service \
            --network=host \
            --restart=always \
            -e MINIMAX_API_KEY=${MiniMaxApiKey} \
            -e AWS_DEFAULT_REGION=${AWS::Region} \
            -e PORT=${S2SPort} \
            cantonese-s2s:latest

          # Create systemd service for auto-restart
          cat > /etc/systemd/system/cantonese-s2s.service << 'SERVICE'
          [Unit]
          Description=Cantonese S2S Services
          After=docker.service
          Requires=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/usr/bin/docker start s2s-service voice-server
          ExecStop=/usr/bin/docker stop voice-server s2s-service

          [Install]
          WantedBy=multi-user.target
          SERVICE

          systemctl daemon-reload
          systemctl enable cantonese-s2s

          # Signal success
          apt-get install -y -qq python3-pip
          pip3 install https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz 2>/dev/null || true
          cfn-signal -e 0 --stack ${AWS::StackName} --resource Instance --region ${AWS::Region} || true

Outputs:
  PublicIP:
    Description: EC2 public IP (configure as Chime Voice Connector Origination target)
    Value: !GetAtt Instance.PublicIp

  SIPEndpoint:
    Description: SIP endpoint for Chime Voice Connector Origination
    Value: !Sub "${Instance.PublicIp}:5060"

  HealthCheck:
    Value: !Sub "http://${Instance.PublicIp}:${VoiceServerPort}/health"

  ActiveCalls:
    Value: !Sub "http://${Instance.PublicIp}:${VoiceServerPort}/api/active-calls"

  ChimeVoiceConnector:
    Value: !Ref ChimeVoiceConnectorDomain

  PhoneNumber:
    Value: !Ref ChimePhoneNumber

  SSH:
    Value: !Sub "ssh -i ${KeyPairName}.pem ubuntu@${Instance.PublicIp}"

  SetupLog:
    Value: "cat /var/log/cantonese-s2s-setup.log"

  ChimeSetupNote:
    Description: After deployment, configure Chime Voice Connector Origination
    Value: !Sub >
      Add Origination route in Chime Voice Connector:
      Host=${Instance.PublicIp}, Port=5060, Protocol=UDP, Priority=1, Weight=1
